name: Update day in chat.svg
on:
  schedule:
    - cron: "5 5 * * *"   # 12 AM Eastern (runs 5:05 UTC; safe across DST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rewrite the day
        run: |
          DAY=$(TZ="America/New_York" date +%A)
          sed -i -E 's|(<tspan id="day">)[^<]*(</tspan>)|\1'"$DAY"'\2|' chat.svg
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet chat.svg; then
            git add chat.svg
            git commit -m "chore: update day to $(TZ='America/New_York' date +%A)"
            git push
          fi